<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f4e"/>
      <stop offset="100%" style="stop-color:#0a1230"/>
    </linearGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4ddb"/>
      <stop offset="100%" style="stop-color:#0e2ea3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Hexagon -->
  <polygon points="50,6 89,27.5 89,72.5 50,94 11,72.5 11,27.5" fill="url(#hex)" opacity="0.85"/>
  <!-- Inner hex ring -->
  <polygon points="50,13 83,31 83,69 50,87 17,69 17,31" fill="none" stroke="rgba(100,160,255,0.3)" stroke-width="1.5"/>
  <!-- N lettermark -->
  <text x="50" y="70" font-family="system-ui,-apple-system,sans-serif" font-weight="900"
    font-size="60" fill="white" text-anchor="middle" filter="url(#glow)"
    style="letter-spacing:-2px">N</text>
  <!-- Subtle top shine -->
  <polygon points="50,6 89,27.5 50,50 11,27.5" fill="white" opacity="0.04"/>
</svg>
